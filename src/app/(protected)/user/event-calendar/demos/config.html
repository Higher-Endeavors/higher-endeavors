			rel="stylesheet"
			href="https://cdn.dhtmlx.com/suite/edge/suite.css"
		/>
		<title>Event Calendar: Configuration</title>
	</head>

	<body>
		<div class="g-wrap">
			<header class="g-header">
				<div class="h-wrap">
					<div class="h-nav">
						<a href="../index.html">Back to demos</a>
					</div>
					<div class="h-title">Event Calendar: Configuration</div>
					<div class="h-cta">
						<a
							href="https://dhtmlx.com/docs/products/dhtmlxEventCalendar/download.shtml"
							target="_blank"
							class="g-btn"
							>Free Trial</a
						>
					</div>
				</div>
			</header>
			<div class="content">
				<div id="root"></div>
				<div class="form move" id="form_wrapper">
					<div class="form-title" id="title">
						Event Calendar config
					</div>
					<div class="form-body" id="form"></div>
				</div>
			</div>
		</div>

		<script>
			const { EventCalendar } = eventCalendar;
			const config = { ...initConfig };

			const widget = new EventCalendar("#root", {
				events: getData(),
				config,
				date: new Date(2022, 5, 10),
			});
			const form = new dhx.Form("form", {
				css: "form-content",
				rows: formControls,
			});
			form.setValue({ ...config, views: config.views.map(v => v.id) });
			const form_wrapper = document.getElementById("form_wrapper");
			const title = document.getElementById("title");
			title.addEventListener("click", () => {
				form_wrapper.classList.toggle("move");
			});
			form.events.on("change", (name, value) => {
				let newConfig = { ...form.getValue() };
				newConfig.views = views.filter(v =>
					newConfig.views.includes(v.id)
				);
				const viewsWithRange = newConfig.views.filter(
					v => v.layout === "week" || v.layout === "day"
				);
				const { start, end } = newConfig;
				viewsWithRange.forEach(v => {
					v.config.timeRange = [start, end];
				});
				widget.setConfig({ config: newConfig });
			});
		</script>
	</body>
</html>
